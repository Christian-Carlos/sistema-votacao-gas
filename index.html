<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      padding: 10px;
    }

    .page-wrap {
      width: 100%;
    }

    .page-wrap.center-screen {
      min-height: calc(100vh - 20px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background: #f3f3f3;
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    #tela1 {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 4px 0;
    }



    .banner {
      width: 100%;
      margin-bottom: 18px;
    }

    .banner img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
    }

    h3 {
      text-align: center;
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 700;
    }

    h4 {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 700;
      color: #1677ee;
      border-bottom: 2px solid #e2e2e2;
      padding-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 18px 16px;
      margin: 10px 0;
      border-radius: 14px;
      border: 1px solid #ccc;
      font-size: 22px;
      background: #fff;
    }

    input::placeholder {
      font-size: 22px;
      color: #777;
    }

    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #1677ee, #0d5bd7);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
      transform: none;
    }

    .hidden { display: none; }

    .ok {
      color: green;
      font-weight: bold;
      font-size: 16px;
      margin: 4px 0 10px;
      min-height: 20px;
    }

    .erro {
      color: red;
      font-weight: bold;
      font-size: 16px;
      margin: 4px 0 10px;
      min-height: 20px;
    }

    .info-box {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #eef5ff;
      color: #114488;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 600;
    }

    .contador-total {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #ffffff;
      color: #111827;
      font-size: 17px;
      line-height: 1.4;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .contador-total.limite {
      color: #b91c1c;
      background: #fee2e2;
    }

    .categoria {
      margin-top: 22px;
      padding: 14px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .categoria-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .categoria-topo h4 {
      margin: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    .contador-categoria {
      font-size: 14px;
      font-weight: 700;
      color: #2563eb;
      background: #eff6ff;
      border-radius: 999px;
      padding: 6px 10px;
    }

    .contador-categoria.limite {
      color: #b91c1c;
      background: #fee2e2;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 16px;
      margin: 12px 0;
      background: #f7f7f7;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
    }

    .card:hover {
      background: #e6f0ff;
    }

    .card.selected {
      border-color: #1677ee;
      background: #dfe9f5;
    }

    .foto-wrap {
      width: 82px;
      height: 82px;
      min-width: 82px;
      border-radius: 50%;
      overflow: hidden;
      background: #ddd;
      flex-shrink: 0;
    }

    .card img {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .card input[type="checkbox"] {
      display: none;
    }

    .card span {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      color: #111827;
    }

    .footer-btn {
      margin-top: 18px;
      position: sticky;
      bottom: 0;
      background: #f3f3f3;
      padding-top: 8px;
      padding-bottom: max(4px, env(safe-area-inset-bottom));
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      overflow: hidden;
      animation: aparecerModal 0.18s ease-out;
    }

    .modal-topo {
      padding: 20px 18px 8px;
      text-align: center;
    }

    .modal-icone {
      width: 62px;
      height: 62px;
      margin: 0 auto 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      color: white;
    }

    .modal-box.sucesso .modal-icone {
      background: linear-gradient(135deg, #16a34a, #22c55e);
    }

    .modal-box.erro .modal-icone {
      background: linear-gradient(135deg, #dc2626, #ef4444);
    }

    .modal-titulo {
      font-size: 22px;
      font-weight: bold;
      margin: 0 0 8px;
      color: #111827;
      border: none;
      padding: 0;
    }

    .modal-mensagem {
      font-size: 18px;
      line-height: 1.45;
      color: #4b5563;
      margin: 0;
      word-break: break-word;
    }

    .modal-acoes {
      padding: 16px 18px 18px;
    }

    .modal-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .modal-box.sucesso .modal-btn {
      background: linear-gradient(135deg, #16a34a, #22c55e);
    }

    .modal-box.erro .modal-btn {
      background: linear-gradient(135deg, #2563eb, #1677ee);
    }

    .modal-box.info .modal-icone {
      background: linear-gradient(135deg, #2563eb, #60a5fa);
    }

    .confirm-acoes {
      display: flex;
      gap: 12px;
    }

    .modal-btn-secundario {
      background: #e5e7eb;
      color: #111827;
    }

    .modal-btn-confirmar {
      background: linear-gradient(135deg, #2563eb, #1677ee);
    }

    @keyframes aparecerModal {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 6px;
      }

      .page-wrap.center-screen {
        min-height: calc(100vh - 12px);
        align-items: flex-start;
        padding-top: 8px;
      }

      .container {
        padding: 12px;
        border-radius: 14px;
      }

      #tela1 {
        max-width: 100%;
      }

      #tela1 .banner {
        margin-bottom: 12px;
      }

      .banner img {
        border-radius: 14px;
      }

      #tela1 h3 {
        font-size: 22px;
        margin-bottom: 12px;
      }

      h4 {
        font-size: 18px;
      }

      #tela1 input {
        padding: 15px 14px;
        margin: 8px 0;
        font-size: 22px;
        border-radius: 12px;
      }

      #tela1 input::placeholder {
        font-size: 20px;
      }

      #tela1 button {
        padding: 16px;
        font-size: 19px;
        border-radius: 12px;
        margin-top: 12px;
      }

      .ok,
      .erro,
      .info-box,
      .contador-total {
        font-size: 14px;
      }

      .contador-categoria {
        font-size: 13px;
      }

      .foto-wrap,
      .card img {
        width: 74px;
        height: 74px;
        min-width: 74px;
      }

      .card {
        gap: 12px;
        padding: 12px;
      }

      .card span {
        font-size: 20px;
      }

      .modal-box {
        max-width: 94%;
      }

      .modal-titulo {
        font-size: 22px;
      }

      .modal-mensagem {
        font-size: 16px;
      }
    }

    @media (min-width: 600px) {
      body {
        padding: 12px;
      }

      .page-wrap.center-screen {
        min-height: calc(100vh - 24px);
      }

      .container {
        max-width: 760px;
        padding: 22px;
      }
    }

    @media (min-width: 900px) {
      .container {
        max-width: 820px;
      }

      #tela1 {
        max-width: 760px;
      }
    }
  </style>
</head>
<body>

<div id="pageWrap" class="page-wrap center-screen">
  <div class="container">

    <div id="tela1">
      <div class="banner">
        <img src="https://drive.google.com/thumbnail?id=1UseIUZkAp8ypFXvvKkeTxtlnbegV1TTb&sz=w1000" alt="Banner">
      </div>

      <h3>VALIDAR ELEITOR</h3>

      <input type="text" id="nome" placeholder="Nome completo" required oninput="atualizarBotao()">

      <input type="text" id="cpf" placeholder="CPF" oninput="formatarCPF(this); verificarCPF();">
      <div id="cpfStatus"></div>

      <input type="email" id="email" placeholder="E-mail" oninput="verificarEmail();">
      <div id="emailStatus"></div>

      <button id="btnProximo" onclick="proxima()" disabled>Próximo</button>
    </div>

    <div id="tela2" class="hidden">
      <h3>Votação</h3>

      <div class="info-box">
        Você pode votar em até <strong>1 candidato por categoria</strong> e no máximo <strong>13 candidatos no total</strong>.
      </div>

      <div id="contadorTotal" class="contador-total">Total selecionado: 0 de 13</div>

      <div id="candidatos"></div>

      <div class="footer-btn">
        <button id="btnFinalizar" onclick="enviar()">Finalizar Voto</button>
      </div>
    </div>

  </div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div id="modalBox" class="modal-box erro">
    <div class="modal-topo">
      <div id="modalIcone" class="modal-icone">!</div>
      <h4 id="modalTitulo" class="modal-titulo">Aviso</h4>
      <p id="modalMensagem" class="modal-mensagem"></p>
    </div>
    <div class="modal-acoes">
      <button id="modalBtn" class="modal-btn" onclick="fecharPopup()">OK</button>
    </div>
  </div>
</div>

<div id="confirmOverlay" class="modal-overlay">
  <div class="modal-box info">
    <div class="modal-topo">
      <div class="modal-icone">?</div>
      <h4 class="modal-titulo">Confirmar voto</h4>
      <p id="confirmMensagem" class="modal-mensagem">Tem certeza que deseja finalizar sua votação?</p>
    </div>
    <div class="modal-acoes confirm-acoes">
      <button class="modal-btn modal-btn-secundario" onclick="fecharConfirmacao(false)">Não</button>
      <button class="modal-btn modal-btn-confirmar" onclick="fecharConfirmacao(true)">Sim</button>
    </div>
  </div>
</div>

<script>
let cpfValido = false;
let emailValido = false;
let acaoAoFecharPopup = null;
let tokenCPF = 0;
let tokenEmail = 0;
let callbackConfirmacao = null;
const FOTO_FALLBACK = "https://www.gravatar.com/avatar?d=mp&s=200";
const LIMITE_TOTAL = 13;
const LIMITE_POR_CATEGORIA = 1;

function atualizarModoTela() {
  const wrap = document.getElementById("pageWrap");
  const tela1 = document.getElementById("tela1");
  const tela1Visivel = !tela1.classList.contains("hidden");

  if (tela1Visivel) {
    wrap.classList.add("center-screen");
  } else {
    wrap.classList.remove("center-screen");
  }
}

function formatarCPF(input) {
  let v = input.value.replace(/\D/g, "").slice(0, 11);
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  input.value = v;
}

function extrairId(url) {
  if (!url) return "";

  const matchId = url.match(/[?&]id=([^&]+)/);
  if (matchId) return matchId[1];

  const matchPath = url.match(/\/d\/([^/]+)/);
  if (matchPath) return matchPath[1];

  return "";
}

function montarFoto(url) {
  const id = extrairId(url);
  if (id) {
    return "https://drive.google.com/thumbnail?id=" + id + "&sz=w200";
  }
  return url || FOTO_FALLBACK;
}

function abrirPopup(tipo, titulo, mensagem, callback) {
  const overlay = document.getElementById("modalOverlay");
  const box = document.getElementById("modalBox");
  const icone = document.getElementById("modalIcone");
  const tituloEl = document.getElementById("modalTitulo");
  const mensagemEl = document.getElementById("modalMensagem");

  box.className = "modal-box " + (tipo === "sucesso" ? "sucesso" : "erro");
  icone.textContent = tipo === "sucesso" ? "✓" : "!";
  tituloEl.textContent = titulo;
  mensagemEl.textContent = mensagem;
  acaoAoFecharPopup = typeof callback === "function" ? callback : null;

  overlay.classList.add("show");
}

function fecharPopup() {
  document.getElementById("modalOverlay").classList.remove("show");
  const callback = acaoAoFecharPopup;
  acaoAoFecharPopup = null;

  if (callback) {
    callback();
  }
}

function abrirConfirmacao(mensagem, callback) {
  document.getElementById("confirmMensagem").textContent = mensagem;
  callbackConfirmacao = typeof callback === "function" ? callback : null;
  document.getElementById("confirmOverlay").classList.add("show");
}

function fecharConfirmacao(confirmado) {
  document.getElementById("confirmOverlay").classList.remove("show");
  const callback = callbackConfirmacao;
  callbackConfirmacao = null;

  if (confirmado && callback) {
    callback();
  }
}

function verificarCPF() {
  const cpf = document.getElementById("cpf").value;
  const email = document.getElementById("email").value;
  const el = document.getElementById("cpfStatus");
  const meuToken = ++tokenCPF;

  if (!cpf.trim()) {
    el.innerHTML = "";
    el.className = "";
    cpfValido = false;
    atualizarBotao();
    return;
  }

  google.script.run
    .withSuccessHandler(res => {
      if (meuToken !== tokenCPF) return;
      el.innerHTML = res.mensagem;
      el.className = res.status === "ok" ? "ok" : "erro";
      cpfValido = res.status === "ok";
      atualizarBotao();
    })
    .withFailureHandler(err => {
      if (meuToken !== tokenCPF) return;
      el.innerHTML = "Erro ao verificar CPF";
      el.className = "erro";
      cpfValido = false;
      atualizarBotao();
      console.error(err);
    })
    .verificarCPF(cpf, email);
}

function verificarEmail() {
  const email = document.getElementById("email").value;
  const cpf = document.getElementById("cpf").value;
  const el = document.getElementById("emailStatus");
  const meuToken = ++tokenEmail;

  if (!email.trim()) {
    el.innerHTML = "";
    el.className = "";
    emailValido = false;
    atualizarBotao();
    return;
  }

  google.script.run
    .withSuccessHandler(res => {
      if (meuToken !== tokenEmail) return;
      el.innerHTML = res.mensagem;
      el.className = res.status === "ok" ? "ok" : "erro";
      emailValido = res.status === "ok";
      atualizarBotao();
    })
    .withFailureHandler(err => {
      if (meuToken !== tokenEmail) return;
      el.innerHTML = "Erro ao verificar e-mail";
      el.className = "erro";
      emailValido = false;
      atualizarBotao();
      console.error(err);
    })
    .validarEmail(email, cpf);
}

function atualizarBotao() {
  const nomePreenchido = !!document.getElementById("nome").value.trim();
  document.getElementById("btnProximo").disabled = !(nomePreenchido && cpfValido && emailValido);
}

function proxima() {
  const nome = document.getElementById("nome").value.trim();
  const cpf = document.getElementById("cpf").value;
  const email = document.getElementById("email").value;
  const btn = document.getElementById("btnProximo");

  if (!nome) {
    abrirPopup("erro", "Atenção", "Informe seu nome para continuar.");
    atualizarBotao();
    return;
  }

  btn.disabled = true;

  google.script.run
    .withSuccessHandler(res => {
      if (res.status === "ok") {
        document.getElementById("tela1").classList.add("hidden");
        document.getElementById("tela2").classList.remove("hidden");
        atualizarModoTela();
        atualizarContadores();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        atualizarBotao();
        abrirPopup("erro", "Atenção", res.mensagem);
      }
    })
    .withFailureHandler(err => {
      atualizarBotao();
      abrirPopup("erro", "Erro", "Erro ao validar eleitor");
      console.error(err);
    })
    .validarEleitor(cpf, email);
}

function contarTotalSelecionados() {
  let total = 0;

  for (const categoria in dados) {
    total += document.querySelectorAll(`input[name="${cssEscapeName(categoria)}"]:checked`).length;
  }

  return total;
}

function contarSelecionadosCategoria(categoria) {
  return document.querySelectorAll(`input[name="${cssEscapeName(categoria)}"]:checked`).length;
}

function cssEscapeName(name) {
  return String(name).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
}

function atualizarContadores() {
  const total = contarTotalSelecionados();
  const elTotal = document.getElementById("contadorTotal");

  if (elTotal) {
    elTotal.textContent = `Total selecionado: ${total} de ${LIMITE_TOTAL}`;
    elTotal.classList.toggle("limite", total >= LIMITE_TOTAL);
  }

  for (const categoria in dados) {
    const el = document.getElementById(`contador_${sanitizar(categoria)}`);
    if (!el) continue;

    const qtd = contarSelecionadosCategoria(categoria);
    el.textContent = `${qtd} de ${LIMITE_POR_CATEGORIA}`;
    el.classList.toggle("limite", qtd >= LIMITE_POR_CATEGORIA);
  }
}

function gerar() {
  let html = "";

  for (let cat in dados) {
    const catId = sanitizar(cat);

    html += `
      <div class="categoria">
        <div class="categoria-topo">
          <h4>${escapeHtml(cat)}</h4>
          <div id="contador_${catId}" class="contador-categoria">0 de ${LIMITE_POR_CATEGORIA}</div>
        </div>
    `;

    [...dados[cat]]
      .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', {
        sensitivity: 'base',
        ignorePunctuation: true
      }))
      .forEach((item, i) => {
      const id = `id_${catId}_${i}`;
      const fotoUrl = montarFoto(item.foto);

      html += `
        <div class="card" data-categoria="${escapeHtml(cat)}" data-id="${id}" onclick="selecionar('${escapeJs(cat)}', '${id}')">
          <input type="checkbox" name="${escapeHtml(cat)}" id="${id}" value="${escapeHtml(item.nome)}">
          <div class="foto-wrap">
            <img src="${escapeHtml(fotoUrl)}" alt="Foto do candidato" onerror="this.onerror=null;this.src='${FOTO_FALLBACK}'">
          </div>
          <span>${escapeHtml(item.nome)}</span>
        </div>`;
    });

    html += `</div>`;
  }

  document.getElementById("candidatos").innerHTML = html;
  atualizarContadores();
}

function selecionar(cat, id) {
  const atual = document.getElementById(id);
  const cardAtual = atual.parentElement;
  const estavaMarcado = atual.checked;
  const totalSelecionados = contarTotalSelecionados();

  if (estavaMarcado) {
    atual.checked = false;
    cardAtual.classList.remove("selected");
    atualizarContadores();
    return;
  }

  if (totalSelecionados >= LIMITE_TOTAL) {
    abrirPopup("erro", "Limite total", "Você pode escolher no máximo 13 candidatos no total.");
    return;
  }

  document.querySelectorAll(`input[name="${cssEscapeName(cat)}"]`).forEach(input => {
    input.checked = false;
    if (input.parentElement) {
      input.parentElement.classList.remove("selected");
    }
  });

  atual.checked = true;
  cardAtual.classList.add("selected");
  atualizarContadores();
}

function limparFormulario() {
  document.getElementById("nome").value = "";
  document.getElementById("cpf").value = "";
  document.getElementById("email").value = "";

  document.getElementById("cpfStatus").innerHTML = "";
  document.getElementById("cpfStatus").className = "";

  document.getElementById("emailStatus").innerHTML = "";
  document.getElementById("emailStatus").className = "";

  cpfValido = false;
  emailValido = false;
  tokenCPF++;
  tokenEmail++;
  atualizarBotao();

  document.querySelectorAll(".card.selected").forEach(card => {
    card.classList.remove("selected");
  });

  document.querySelectorAll('input[type="checkbox"]').forEach(input => {
    input.checked = false;
  });

  atualizarContadores();
}

function voltarInicio() {
  document.getElementById("tela2").classList.add("hidden");
  document.getElementById("tela1").classList.remove("hidden");
  atualizarModoTela();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function coletarVotos() {
  const votos = {};

  for (let cat in dados) {
    const selecionados = Array.from(document.querySelectorAll(`input[name="${cssEscapeName(cat)}"]:checked`))
      .map(input => input.value);

    votos[cat] = selecionados;
  }

  return votos;
}

function processarEnvioVoto() {
  const votos = coletarVotos();
  const totalSelecionados = contarTotalSelecionados();

  if (totalSelecionados === 0) {
    abrirPopup("erro", "Atenção", "Selecione pelo menos 1 candidato.");
    return;
  }

  if (totalSelecionados > LIMITE_TOTAL) {
    abrirPopup("erro", "Limite total", "Você pode escolher no máximo 13 candidatos no total.");
    return;
  }

  const btn = document.getElementById("btnFinalizar");
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false;

      if (res === "Votação realizada") {
        abrirPopup("sucesso", "Tudo certo!", "Votação realizada com sucesso.", function() {
          limparFormulario();
          voltarInicio();
        });
      } else {
        abrirPopup("erro", "Atenção", res);
      }
    })
    .withFailureHandler(err => {
      btn.disabled = false;
      abrirPopup("erro", "Erro", "Erro ao salvar votação");
      console.error(err);
    })
    .salvarDados({
      nome: document.getElementById("nome").value,
      cpf: document.getElementById("cpf").value,
      email: document.getElementById("email").value,
      votos: votos
    });
}

function enviar() {
  abrirConfirmacao("Tem certeza que deseja finalizar sua votação? Se confirmar, seu voto será computado e não poderá ser alterado.", function() {
    processarEnvioVoto();
  });
}

function sanitizar(texto) {
  return String(texto)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9]+/g, "_");
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function escapeJs(str) {
  return String(str)
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'");
}

document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target.id === "modalOverlay") {
    fecharPopup();
  }
});

document.getElementById("confirmOverlay").addEventListener("click", function(e) {
  if (e.target.id === "confirmOverlay") {
    fecharConfirmacao(false);
  }
});

gerar();
atualizarModoTela();
